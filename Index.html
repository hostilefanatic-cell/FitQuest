<!-- PWA: iOS standalone mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitQuest">

<!-- PWA: Android/Chrome -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<meta name="background-color" content="#0a0e17">

<!-- PWA: App icon (inline SVG as data URI) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230a0e17'/><text x='256' y='330' text-anchor='middle' font-size='260'>⚔</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230a0e17'/><text x='256' y='330' text-anchor='middle' font-size='260'>⚔</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
// PWA: Register inline manifest via blob URL
const manifest = {
  name: "FitQuest — Your Fitness RPG",
  short_name: "FitQuest",
  description: "Gamified fitness tracker with RPG progression",
  start_url: "./",
  display: "standalone",
  orientation: "portrait",
  background_color: "#0a0e17",
  theme_color: "#0a0e17",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230a0e17'/><text x='256' y='330' text-anchor='middle' font-size='260'>⚔</text></svg>",
    sizes: "512x512",
    type: "image/svg+xml",
    purpose: "any maskable"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);

// PWA: Register minimal service worker for offline support
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'fitquest-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}
</script>

<body>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="confetti-container" id="confetti"></div>

<script>
// ─── DATA & STATE ───
const STORAGE_KEY = 'fitquest_data';

const defaultState = () => ({
  xp: 0,
  level: 1,
  streak: 0,
  totalWorkouts: 0,
  phase: 1,
  phaseWorkouts: 0,
  todayEnergy: null,
  todayCompleted: [],
  todayDone: false,
  todayRest: false,
  lastWorkoutDate: null,
  history: {},
  badges: [],
  weeklyLog: []
});

let state = defaultState();

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) state = { ...defaultState(), ...JSON.parse(d) };
  } catch(e) {}
  checkStreak();
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function checkStreak() {
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.lastWorkoutDate === today) return;
  if (state.lastWorkoutDate !== yesterday && state.lastWorkoutDate !== today) {
    if (state.lastWorkoutDate && state.streak > 0) {
      state.streak = 0;
      save();
    }
  }
}

function isTodayDone() {
  return state.history[todayStr()] === 'done' || state.history[todayStr()] === 'rest';
}

// ─── XP & LEVELING ───
function xpForLevel(l) { return 80 + (l - 1) * 40; }
function xpProgress() { return state.xp % xpForLevel(state.level); }
function xpNeeded() { return xpForLevel(state.level); }

function addXP(amount) {
  state.xp += amount;
  while (xpProgress() >= xpNeeded() || state.xp >= cumulativeXP(state.level + 1)) {
    state.level++;
    showToast(`⬆ LEVEL ${state.level}!`, 'level-toast');
  }
  save();
}

function cumulativeXP(targetLevel) {
  let total = 0;
  for (let i = 1; i < targetLevel; i++) total += xpForLevel(i);
  return total;
}

// ─── PHASES ───
const PHASES = [

function getCurrentPhase() { return PHASES.find(p => p.id === state.phase); }

function checkPhaseUp() {
  const cp = getCurrentPhase();
  if (state.phase < 4 && state.phaseWorkouts >= cp.minWorkouts) {
    state.phase++;
    state.phaseWorkouts = 0;
    save();
    showToast(`🎖 PHASE ${state.phase}: ${PHASES[state.phase-1].name}!`, 'level-toast');
  }
}

function checkBadges() {
  BADGE_DEFS.forEach(b => {
    if (!state.badges.includes(b.id) && b.check(state)) {
      state.badges.push(b.id);
      showToast(`🏅 Badge: ${b.name}!`, 'level-toast');
    }
  });
  save();
}

// ─── UI ───
let activeTab = 'today';
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let currentWorkout = null;

function showToast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast', 2500);
}

function fireConfetti() {
  const c = document.getElementById('confetti');
  const colors = ['#00e5a0','#00c9ff','#ffd700','#ff6b35','#b366ff','#ff4d6a'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.8 + 's';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.width = (4 + Math.random() * 8) + 'px';
    p.style.height = (4 + Math.random() * 8) + 'px';
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML = '', 3000);
}

      <div class="tip-item"><strong>Dopamine bait:</strong> Watch a show, listen to a podcast, or put on music ONLY during workouts. Make it the fun time, not the punishment time.</div>
      <div class="tip-item"><strong>Variable schedule hack:</strong> Energy level selection means the plan adapts to YOUR day. Baby had a rough night? Pick 🐢. Got a free 30 min? Pick 🔥. No planning needed.</div>
      <div class="tip-item"><strong>Don't break the chain:</strong> Rest days are fine (1/week without streak penalty). But the XP number going up and the streak counter are designed for your brain. Protect them.</div>
    </div>

    <div class="tips-card">
      <h3>⚙ Equipment Form Cues</h3>
      <div class="tip-item"><strong>Walkpad:</strong> Stand tall, eyes forward (not at phone), swing arms naturally. Start at 3 km/h and increase gradually. Don't hold the rails once you're comfortable.</div>
      <div class="tip-item"><strong>Spin bike:</strong> Seat height = hip level when standing next to bike. Slight knee bend at bottom of pedal stroke. Don't death-grip the handlebars — light touch.</div>
      <div class="tip-item"><strong>Dumbbells:</strong> Start lighter than you think you need. If you can't do 8 reps with good form, it's too heavy. Increase weight only when 12 reps feel easy. Wrists stay neutral (not bent).</div>
      <div class="tip-item"><strong>Bands:</strong> Control both directions — the stretch AND the return. Slow eccentrics build more strength. Never let bands snap back. Check for tears before every use.</div>
    </div>

    <div class="tips-card">
      <h3>📐 The Golden Rules</h3>
      <div class="tip-item"><strong>Breathe:</strong> Exhale on effort, inhale on release. Never hold your breath under load.</div>
      <div class="tip-item"><strong>Hydrate:</strong> Drink water before, during, after. Not chai. Water.</div>
      <div class="tip-item"><strong>Warm up ALWAYS:</strong> The warm-up section isn't optional. Cold muscles + sudden load = injury. Especially important for your back.</div>
      <div class="tip-item"><strong>Cool down ALWAYS:</strong> Stretching after exercise is when you actually gain flexibility. It also prevents next-day stiffness for your neck and back.</div>
      <div class="tip-item"><strong>Progressive overload:</strong> The plan handles this automatically through phases. Don't skip ahead. Your connective tissues (tendons, ligaments) adapt slower than muscles — give them time.</div>
      <div class="tip-item"><strong>Sleep:</strong> Your muscles don't grow during workouts — they grow during sleep. This matters doubly with a young kid. If you're running on <5 hours, pick low energy. Recovery IS training.</div>
      <div class="tip-item"><strong>When in doubt, see a physio:</strong> If your back pain persists or worsens despite 2+ weeks of consistent gentle exercise, consult a physiotherapist. This plan is general guidance, not a medical prescription.</div>
    </div>
  </div>`;

  // Reset button
  html += `<button class="reset-btn" onclick="resetAll()">Reset All Progress</button>`;

  document.getElementById('app').innerHTML = html;
}

function exerciseHTML(ex, idx, done) {
  return `<div class="exercise-item">
    <div class="exercise-check ${done?'done':''}" onclick="toggleExercise(${idx})"></div>
    <div class="exercise-info">
      <div class="exercise-name" style="${done?'text-decoration:line-through;opacity:0.5':''}">${ex.name}</div>
      <div class="exercise-detail">${ex.detail}</div>
    </div>
    <div class="exercise-xp">+${ex.xp} XP</div>
  </div>`;
}

function renderCalendar() {
  const d = new Date(calYear, calMonth, 1);
  const monthName = d.toLocaleString('default', { month:'long', year:'numeric' });
  const startDay = d.getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = todayStr();

  let html = `<div class="calendar-month">
    <h3>
      <button class="cal-nav" onclick="calPrev()">◀</button>
      ${monthName}
      <button class="cal-nav" onclick="calNext()">▶</button>
    </h3>
    <div class="cal-grid">`;

  ['S','M','T','W','T','F','S'].forEach(d => {
    html += `<div class="cal-header">${d}</div>`;
  });

  for (let i = 0; i < startDay; i++) html += `<div class="cal-day empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = ds === today;
    const status = state.history[ds];
    let cls = 'cal-day active';
    if (isToday) cls += ' today';
    if (status === 'done') cls += ' done';
    else if (status === 'rest') cls += ' rest';
    html += `<div class="${cls}">${day}</div>`;
  }

  html += `</div></div>`;
  return html;
}

// ─── ACTIONS ───
function switchTab(t) { activeTab = t; render(); }

function pickEnergy(e) {
  state.todayEnergy = e;
  state.todayCompleted = [];
  currentWorkout = null;
  render();
}

function toggleExercise(idx) {
  if (state.todayCompleted.includes(idx)) {
    state.todayCompleted = state.todayCompleted.filter(i => i !== idx);
  } else {
    state.todayCompleted.push(idx);
    showToast(`+XP ⚡`, '');
  }
  render();
}

function completeWorkout(totalXP) {
  const today = todayStr();
  state.history[today] = 'done';
  state.totalWorkouts++;
  state.phaseWorkouts++;

  // Streak logic
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.lastWorkoutDate === yesterday || state.lastWorkoutDate === today || state.streak === 0) {
    state.streak++;
  }
  state.lastWorkoutDate = today;

  addXP(totalXP);

  // Streak bonus
  if (state.streak > 0 && state.streak % 7 === 0) {
    addXP(50);
    setTimeout(() => showToast(`🔥 ${state.streak}-DAY STREAK! +50 BONUS XP`, 'streak-toast'), 1500);
  }

  state.todayEnergy = null;
  state.todayCompleted = [];
  currentWorkout = null;

  checkPhaseUp();
  checkBadges();
  save();

  fireConfetti();
  showToast(`+${totalXP} XP EARNED! 🎉`, '');

  setTimeout(render, 300);
}

function logRest() {
  const today = todayStr();
  // Count rest days this week (last 7 days)
  let restCount = 0;
  for (let i = 1; i <= 7; i++) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0,10);
    if (state.history[d] === 'rest') restCount++;
  }
  state.history[today] = 'rest';
  if (restCount >= 1) {
    // More than 1 rest day this week = streak breaks
    showToast('😴 Rest logged. Streak paused (2+ rest days this week).', '');
  } else {
    // First rest day this week — streak preserved
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (state.lastWorkoutDate === yesterday || state.streak === 0) {
      // Don't increment streak but don't break it either
    }
    state.lastWorkoutDate = today;
    showToast('😴 Rest day logged. Streak safe!', '');
  }
  save();
  render();
}

function resetToday() {
  state.todayEnergy = null;
  state.todayCompleted = [];
  currentWorkout = null;
  render();
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} render(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} render(); }

function resetAll() {
  if (confirm('Reset ALL progress? XP, streak, badges — everything goes. Are you sure?')) {
    if (confirm('Seriously — this cannot be undone. Last chance.')) {
      state = defaultState();
      save();
      currentWorkout = null;
      render();
      showToast('Progress reset. New game. 🎮', '');
    }
  }
}

// ─── INIT ───
load();
render();
</script>
